databaseChangeLog:
  - changeSet:
      id: 005-create-time-entries
      author: nickmenshikov
      changes:
        - createTable:
            tableName: time_entries
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_time_entries_task
                    references: tasks(id)
                    deleteCascade: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_time_entries_user
                    references: users(id)
              - column:
                  name: started_at
                  type: TIMESTAMPTZ
                  constraints:
                    nullable: false
              - column:
                  name: stopped_at
                  type: TIMESTAMPTZ
              - column:
                  name: duration_seconds
                  type: INTEGER
              - column:
                  name: note
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - createIndex:
            tableName: time_entries
            indexName: idx_time_entries_task
            columns:
              - column:
                  name: task_id