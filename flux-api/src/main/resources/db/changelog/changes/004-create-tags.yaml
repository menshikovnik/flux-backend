databaseChangeLog:
  - changeSet:
      id: 004-create-tags
      author: nickmenshikov
      changes:
        - createTable:
            tableName: tags
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tags_user
                    references: users(id)
                    deleteCascade: true
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: color
                  type: VARCHAR(7)
        - addUniqueConstraint:
            tableName: tags
            columnNames: user_id, name
            constraintName: uq_tags_user_name
        - createTable:
            tableName: task_tags
            columns:
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_task_tags_task
                    references: tasks(id)
                    deleteCascade: true
              - column:
                  name: tag_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_task_tags_tag
                    references: tags(id)
                    deleteCascade: true
        - addPrimaryKey:
            tableName: task_tags
            columnNames: task_id, tag_id
            constraintName: pk_task_tags