databaseChangeLog:
  - changeSet:
      id: 006-create-audit-log
      author: nickmenshikov
      changes:
        - createTable:
            tableName: task_history
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_history_task
                    references: tasks(id)
                    deleteCascade: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_history_user
                    references: users(id)
              - column:
                  name: field_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: old_value
                  type: TEXT
              - column:
                  name: new_value
                  type: TEXT
              - column:
                  name: changed_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: now()
                  constraints:
                    nullable: false